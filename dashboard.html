
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BuildFolio Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0F172A,#1E293B);
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#1E293B;
}

.logo{
font-size:22px;
font-weight:bold;
color:#38BDF8;
}

.nav-links{
display:flex;
gap:25px;
}

.nav-links a{
text-decoration:none;
color:white;
font-weight:500;
}

.logout{
color:#F87171;
cursor:pointer;
}

/* HEADER */

header{
text-align:center;
padding:40px 20px;
}

header h1{
color:#38BDF8;
}

/* CARDS */

.options{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
padding:20px;
}

.option-card{
background:#1E293B;
padding:30px;
width:260px;
border-radius:15px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

.option-card .icon{
font-size:40px;
}

.option-card button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#38BDF8;
cursor:pointer;
font-weight:bold;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">BuildFolio</div>

<div class="nav-links">
<a href="dashboard.html">Home</a>
<a href="manual-portfolio.html">Manual</a>
<a href="ai-portfolio.html">AI Portfolio</a>
<a class="logout" onclick="logout()">Logout</a>
</div>

</div>


<!-- HEADER -->

<header>

<h1>Welcome to BuildFolio 👋</h1>

<p>Choose how you want to build your portfolio</p>

</header>


<!-- OPTIONS -->

<div class="options">

<div class="option-card">

<div class="icon">🖌️</div>

<h2>Create Manually</h2>

<p>Design your portfolio yourself with sections and projects.</p>

<button onclick="openManual()">Create</button>

</div>


<div class="option-card">

<div class="icon">🤖</div>

<h2>AI Portfolio Builder</h2>

<p>Let AI generate a portfolio automatically.</p>

<button onclick="openAI()">Use AI</button>

</div>

</div>


<script>

function openManual(){

window.location.href="manual-portfolio.html"

}

function openAI(){

window.location.href="ai-portfolio.html"

}

function logout(){

alert("You have been logged out")

window.location.href="login.html"

}

</script>

</body>

</html>
